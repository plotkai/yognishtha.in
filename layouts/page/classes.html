<script>
  function parseTime(str) {
    // "09:00" -> Date object today at 09:00
    const [h, m] = str.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }
  function isNowBetween(start, end) {
    const now = new Date();
    return now >= start && now <= end;
  }
  document.addEventListener('DOMContentLoaded', function() {
    const list = document.getElementById('today-classes-list');
    if (!list) return;
    const items = Array.from(list.querySelectorAll('li'));
    let liveItems = [];
    let otherItems = [];
    items.forEach(item => {
      const startAttr = item.getAttribute('data-start');
      const endAttr = item.getAttribute('data-end');
      if (!startAttr || !endAttr) {
        otherItems.push(item);
        return;
      }
      const start = parseTime(startAttr);
      const end = parseTime(endAttr);
      const dot = item.querySelector('.live-dot');
      const btn = item.querySelector('.btn');
      if (isNowBetween(start, end)) {
        if (dot) dot.style.display = 'inline-block';
        if (btn) {
          btn.classList.remove('btn-secondary');
          btn.classList.add('btn-primary');
          btn.disabled = false;
        }
        liveItems.push(item);
      } else {
        if (dot) dot.style.display = 'none';
        if (btn) {
          btn.classList.remove('btn-primary');
          btn.classList.add('btn-secondary');
          btn.disabled = true;
        }
        otherItems.push(item);
      }
    });
    // Move live items to top
    list.innerHTML = '';
    liveItems.concat(otherItems).forEach(item => list.appendChild(item));
  });
</script>
