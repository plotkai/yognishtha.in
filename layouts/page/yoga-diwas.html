{{ define "main" }}
<section class="ftco-gallery ftco-section">
  <div class="container-fluid px-md-5">
    <div class="row justify-content-center mb-5 pb-3">
      <div class="col-md-7 heading-section ftco-animate text-center">
        <h2 class="mb-1">International Yoga Diwas 2025</h2>
      </div>
    </div>
    <div class="row">
      <div class="col-md-3 ftco-animate">
        <a href="{{ "images/yoga-diwas100.jpeg" | relURL }}" class="gallery image-popup img d-flex align-items-center" style="background-image: url({{ "images/yoga-diwas100.jpeg" | relURL }});">
          <div class="icon mb-4 d-flex align-items-center justify-content-center">
            <span class="icon-instagram"></span>
          </div>
        </a>
      </div>
      <div class="col-md-3 ftco-animate">
        <a href="{{ "images/yoga-diwas101.jpeg" | relURL }}" class="gallery image-popup img d-flex align-items-center" style="background-image: url({{ "images/yoga-diwas101.jpeg" | relURL }});">
          <div class="icon mb-4 d-flex align-items-center justify-content-center">
            <span class="icon-instagram"></span>
          </div>
        </a>
      </div>
      {{ range seq 0 10 }}
      <div class="col-md-3 ftco-animate">
        <a href="{{ printf "images/yogaday%d.jpeg" . | relURL }}" class="gallery image-popup img d-flex align-items-center" style="background-image: url({{ printf "images/yogaday%d.jpeg" . | relURL }});">
          <div class="icon mb-4 d-flex align-items-center justify-content-center">
            <span class="icon-instagram"></span>
          </div>
        </a>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
