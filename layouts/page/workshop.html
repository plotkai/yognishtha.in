{{ define "main" }}
<section class="ftco-gallery ftco-section">
  <div class="container-fluid px-md-5">
    <div class="row justify-content-center mb-5 pb-3">
      <div class="col-md-7 heading-section ftco-animate text-center">
        <h2 class="mb-1">Successful Events</h2>
      </div>
    </div>
    <div class="row">
      <!-- Generated 32 dynamic workshop event items -->
      {{ range seq 1 32 }}
      <div class="col-md-3 ftco-animate">
        <a href="{{ printf "images/workshop%d.jpeg" . | relURL }}" class="gallery image-popup img d-flex align-items-center" style="background-image: url({{ printf "images/workshop%d.jpeg" . | relURL }});">
          <div class="icon mb-4 d-flex align-items-center justify-content-center">
            <span class="icon-instagram"></span>
          </div>
        </a>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
